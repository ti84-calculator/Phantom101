<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Unblocked</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/search.css">
    <link rel="stylesheet" href="components/topbar.css">
    <link rel="stylesheet" href="styles/background.css">

    <style>
        html,
        body {
            height: 100%;
        }

        .home-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 200px 24px 40px;
            text-align: center;
        }

        .site-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, #e4e4e7 0%, #a1a1aa 40%, #52525b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .site-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            min-height: 24px;
        }

        /* Search Bar */
        .search-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 48px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 9999px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .search-bar:hover {
            background: var(--surface-hover);
        }

        .search-bar:focus-within {
            border-color: var(--text-muted);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .search-bar i {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 1rem;
        }

        .search-bar input::placeholder {
            color: var(--text-muted);
        }

        /* Featured Section */
        .featured-section {
            width: 100%;
            max-width: 800px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .star-icon {
            color: #fbbf24;
            font-size: 0.875rem;
        }

        .featured-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }

        .featured-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            color: var(--text);
        }

        .featured-card:hover {
            background: var(--surface-hover);
            border-color: var(--border-light);
            transform: translateY(-2px);
        }

        .featured-card-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            overflow: hidden;
        }

        .featured-card-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .featured-card-title {
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .offline-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: var(--space-sm) var(--space-md);
            background: var(--warning);
            color: var(--bg);
            text-align: center;
            font-size: 0.875rem;
            font-weight: 500;
            z-index: var(--z-toast);
            transform: translateY(-100%);
            transition: transform var(--transition-normal);
        }

        .offline-banner.show {
            transform: translateY(0);
        }

        @media (max-width: 640px) {
            .site-title {
                font-size: 1.75rem;
            }

            .featured-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
        }

        /* Minimal HUD Widgets */
        .side-widget {
            position: fixed;
            top: 250px;
            width: 220px;
            padding: 16px;
            background: rgba(15, 15, 15, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .side-widget:hover {
            background: rgba(25, 25, 25, 0.3);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .left-widget {
            left: calc(50% - 640px);
            top: 260px;
        }

        .right-widget {
            left: calc(50% + 420px);
            top: 260px;
        }

        .widget-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--text-dim);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            cursor: grab;
            user-select: none;
            padding: 4px 0;
        }

        .widget-header:active {
            cursor: grabbing;
        }

        .side-widget.dragging {
            opacity: 0.8;
            scale: 1.02;
            z-index: 100;
            cursor: grabbing;
        }

        .widget-header i {
            font-size: 0.8rem;
        }

        /* Tiny Weather HUD */
        .weather-hud {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .weather-temp-bin, .weather-precip-bin {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 99px;
            width: 100%;
            justify-content: space-between;
        }

        .weather-temp-bin i {
            color: var(--accent);
            font-size: 1rem;
        }

        .weather-temp-bin span {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .weather-precip-bin i {
            color: #3b82f6; /* Blue for rain/precip */
            font-size: 0.8rem;
        }

        .weather-precip-bin span {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .weather-loc-tag {
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 4px;
        }

        /* Tiny News Widget */
        .news-item {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .news-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .news-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
            line-height: 1.2;
        }

        .news-summary {
            font-size: 0.65rem;
            color: var(--text-dim);
            line-height: 1.3;
        }

        .news-meta {
            font-size: 0.6rem;
            color: var(--accent);
            font-weight: 600;
            opacity: 0.6;
        }

        @media (max-width: 1000px) {
            .side-widget {
                display: none;
            }
            .mobile-widgets {
                display: block;
                width: 100%;
                max-width: 500px;
                margin-top: 24px;
                padding: 0 16px;
            }
        }

        @media (min-width: 1001px) {
            .mobile-widgets {
                display: none;
            }
        }
    </style>
    <script>
        (function() {
            var isUnblocked = localStorage.getItem('phantom_unblock_all') === 'true' || new URLSearchParams(location.search).has('unblock');
            
            if (isUnblocked) {
                localStorage.setItem('phantom_unblock_all', 'true');

                try {
                    const sJSON = localStorage.getItem('void_settings');
                    const s = sJSON ? JSON.parse(sJSON) : {};
                    if (s.cloakMode !== 'none') {
                        s.cloakMode = 'none';
                        localStorage.setItem('void_settings', JSON.stringify(s));
                    }
                } catch (e) { }
                
                window.addEventListener('beforeunload', (e) => {
                    e.preventDefault();
                    e.returnValue = '';
                });

                window.showLoading = window.showLoading || (() => {});
                window.hideLoading = window.hideLoading || (() => {});
            }
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <script src="config.js" defer></script>
    <script src="scripts/settings.js" defer></script>
    <script src="scripts/background.js" defer></script>
    <script src="scripts/cloaking.js" defer></script>
    <script src="scripts/quotes.js" defer></script>
    <script src="scripts/notifications.js" defer></script>
    <script src="scripts/rotation.js" defer></script>
    <script src="scripts/featured.js" defer></script>
    <script src="scripts/gloader.js" defer></script>
    <script src="scripts/search.js" defer></script>
    <script src="https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.all.js" defer></script>
    <script type="module">
        import * as BareMux from "https://cdn.jsdelivr.net/npm/@mercuryworkshop/bare-mux/dist/index.mjs";
        window.BareMux = BareMux;
    </script>
</head>

<body>
    <div class="offline-banner" id="offline-banner">
        <i class="fa-solid fa-wifi-slash"></i>
        <span>You're offline</span>
    </div>

    <div class="home-page">
        <script src="components/topbar.js"></script>

        <main class="main-content">
            <!-- Floating Side Widgets -->
            <div id="weather-widget-container" class="side-widget left-widget">
                <div class="widget-header"><i class="fa-solid fa-cloud-sun"></i><span>Weather</span></div>
                <div id="weather-widget"></div>
            </div>

            <div id="news-widget-container" class="side-widget right-widget">
                <div class="widget-header"><i class="fa-solid fa-newspaper"></i><span>News</span></div>
                <div id="news-widget"></div>
            </div>

            <h1 class="site-title">Phantom Unblocked</h1>
            <p class="site-subtitle" id="subtitle"></p>

            <!-- Search Bar -->
            <div class="search-container">
                <form class="search-bar" onsubmit="handleSearch(event)">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search the web and games..." autocomplete="off">
                </form>
            </div>

            <!-- Featured -->
            <section class="featured-section">
                <div class="section-header">
                    <i class="fa-solid fa-star star-icon"></i>
                    <span class="section-title">Featured</span>
                </div>
                <div class="featured-grid" id="featured-grid"></div>
            </section>

            <!-- Mobile Widgets -->
            <div class="mobile-widgets">
                <div class="side-widget" style="position: static; width: 100%; margin-bottom: 16px;">
                    <div class="widget-header"><i class="fa-solid fa-cloud-sun"></i><span>Weather</span></div>
                    <div id="weather-widget-mobile"></div>
                </div>
                <div class="side-widget" style="position: static; width: 100%;">
                    <div class="widget-header"><i class="fa-solid fa-newspaper"></i><span>News</span></div>
                    <div id="news-widget-mobile"></div>
                </div>
            </div>

            <!-- Online Counter -->
            <div class="online-counter" style="margin-top: 24px; font-size: 0.875rem; color: var(--text-muted);">
                <span id="page-online-count">--</span> online
                <span id="page-refresh-countdown" style="margin-left: 4px; opacity: 0.6;"></span>
            </div>
        </main>

        <!-- New Widget Scripts -->
        <script src="scripts/weather.js" defer></script>
        <script src="scripts/news.js" defer></script>
        <script src="scripts/draggable.js" defer></script>

    </div>


    <script>
        // Featured 
        window.addEventListener('DOMContentLoaded', async () => {
            if (!window.FeaturedGames) return;
            await window.FeaturedGames.load();
            const featuredGames = window.FeaturedGames.games || [];

            const grid = document.getElementById('featured-grid');
            if (!grid) return;

            const fragment = document.createDocumentFragment();
            featuredGames.forEach(g => {
                const card = document.createElement('a');
                card.href = g.url;
                card.className = 'featured-card';
                card.innerHTML = `
                    <div class="featured-card-icon" style="background: ${g.bgColor || (g.gameName ? 'transparent' : 'var(--surface-hover)')}; color: var(--text-muted);">
                        ${g.img ? `<img src="${g.img}" loading="eager" onerror="this.parentElement.innerHTML='<i class=\\'fa-solid fa-gamepad\\'></i>'">` : `<i class="${g.icon}"></i>`}
                    </div>
                    <div class="featured-card-title">${g.name}</div>
                `;
                fragment.appendChild(card);
            });
            grid.appendChild(fragment);
        });



        // Theme notification
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (window.Notify) {
                    window.Notify.info("Appearance", "Don't like your theme? Change it in settings!", 6000);
                }
            }, 1500);
        });
    </script>

    <script src="components/footer.js" defer></script>
    <script src="scripts/init.js" defer></script>
</body>

</html>
