<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Phantom</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .ghost-icon {
            font-size: 4rem;
            color: #52525b;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .error-code {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(90deg, #e4e4e7 0%, #a1a1aa 40%, #52525b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 12px;
        }

        .error-message {
            font-size: 1.125rem;
            color: #71717a;
            margin-bottom: 32px;
            font-weight: 500;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: #0f0f0f;
            border: 1px solid #1f1f1f;
            border-radius: 8px;
            color: #e4e4e7;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, border-color 0.15s;
        }

        .home-btn:hover {
            background: #1a1a1a;
            border-color: #2a2a2a;
        }

        .home-btn:active {
            transform: scale(0.98);
        }

        @media (max-width: 640px) {
            .error-code { font-size: 3.5rem; }
            .ghost-icon { font-size: 3rem; }
        }
    </style>
</head>

<body>
    <i class="fa-solid fa-ghost ghost-icon"></i>
    <div class="error-code">404</div>
    <p class="error-message">This page doesn't exist.</p>
    <a href="/" class="home-btn">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Phantom
    </a>
</body>

</html>
