<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>New Tab</title><link rel="stylesheet" href="../styles/main.css"><link rel="stylesheet" href="../styles/background.css"><link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/webfonts/fa-solid-900.woff2" as="font" type="font/woff2" crossorigin><script src="../config.js" defer="defer"></script><script src="../scripts/settings.js" defer="defer"></script><script src="../scripts/background.js" defer="defer"></script><script src="../scripts/quotes.js" defer="defer"></script><link rel="stylesheet" href="suggestions.css"><script src="suggestions.js" defer="defer"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      transition: background 0.3s ease;
    }



    .clock {
      font-size: 4rem;
      font-weight: 600;
      letter-spacing: -2px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .date {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 40px;
      position: relative;
      z-index: 10;
    }





    .search-box i {
      color: var(--text-muted);
      font-size: 14px;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }

    .search-box input::placeholder {
      color: var(--text-dim);
    }

    .search-box select {
      background: var(--surface-hover);
      border: none;
      border-radius: 6px;
      color: var(--text-muted);
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    .shortcuts {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      max-width: 500px;
      width: 100%;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      cursor: pointer;
    }

    .shortcut-icon {
      width: 52px;
      height: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }



    .shortcut:hover .shortcut-icon {
      background: var(--surface-hover);
      transform: translateY(-2px);
    }

    .shortcut-icon img {
      width: 22px;
      height: 22px;
      filter: brightness(0) invert(0.7);
    }

    .shortcut-icon i {
      font-size: 20px;
      color: var(--text-muted);
    }

    .shortcut-label {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      max-width: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .shortcut:hover .shortcut-label {
      color: var(--text);
    }

    .quote {
      position: fixed;
      bottom: 24px;
      font-size: 13px;
      color: var(--text-dim);
      max-width: 400px;
      text-align: center;
    }</style></head><body><div class="clock" id="clock">00:00</div><div class="date" id="date"></div><form class="search-box" id="searchForm"><i class="fa-solid fa-magnifying-glass"></i> <input type="text" id="searchInput" placeholder="Search the web..." autocomplete="off"><div id="suggestions" class="suggestions-dropdown"></div><select id="engine"><option value="https://search.brave.com/search?q=">Brave</option><option value="https://duckduckgo.com/?q=">DuckDuckGo</option><option value="https://www.bing.com/search?q=">Bing</option><option value="https://search.yahoo.com/search?p=">Yahoo!</option></select></form><div class="shortcuts" id="shortcuts"><a class="shortcut" data-url="https://youtube.com"><div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg"></div><span class="shortcut-label">YouTube</span> </a><a class="shortcut" data-url="https://github.com"><div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg"></div><span class="shortcut-label">GitHub</span> </a><a class="shortcut" data-url="https://discord.com"><div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg"></div><span class="shortcut-label">Discord</span> </a><a class="shortcut" data-url="https://twitter.com"><div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg"></div><span class="shortcut-label">Twitter</span> </a><a class="shortcut" data-url="https://reddit.com"><div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/reddit.svg"></div><span class="shortcut-label">Reddit</span> </a><a class="shortcut" data-url="https://spotify.com"><div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg"></div><span class="shortcut-label">Spotify</span> </a><a class="shortcut" data-url="https://netflix.com"><div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/netflix.svg"></div><span class="shortcut-label">Netflix</span> </a><a class="shortcut" data-url="https://twitch.tv"><div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/twitch.svg"></div><span class="shortcut-label">Twitch</span> </a><a class="shortcut" data-url="https://mail.google.com"><div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gmail.svg"></div><span class="shortcut-label">Gmail</span></a><div class="shortcut" id="addShortcut"><div class="shortcut-icon"><i class="fa-solid fa-plus"></i></div><span class="shortcut-label">Add</span></div></div><div class="quote" id="quote"></div><script>document.addEventListener('DOMContentLoaded', () => {
    const $ = s => document.querySelector(s);
    const nav = url => {
      window.parent?.postMessage({ type: 'navigate', url }, '*');
    };

    // Apply settings
    if (window.Settings) Settings.apply();

    // Initialize quotes
    if (window.Quotes) Quotes.init(true);

    // Clock
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
      $('#clock').textContent = timeStr.replace(/\s?[APM]+/gi, '');
      $('#date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Search
    const engineSelect = $('#engine');
    const savedEngine = window.Settings ? Settings.get('searchEngine') : localStorage.getItem('searchEngine');
    if (savedEngine) engineSelect.value = savedEngine;

    engineSelect.onchange = () => {
      if (window.Settings) Settings.set('searchEngine', engineSelect.value);
      else localStorage.setItem('searchEngine', engineSelect.value);
    };

    $('#searchForm').onsubmit = e => {
      e.preventDefault();
      const q = $('#searchInput').value.trim();
      if (q) nav(engineSelect.value + encodeURIComponent(q));
    };

    // Shortcuts
    $('#shortcuts').onclick = e => {
      const shortcut = e.target.closest('.shortcut[data-url]');
      const addBtn = e.target.closest('#addShortcut');

      if (shortcut) {
        e.preventDefault();
        nav(shortcut.dataset.url);
      } else if (addBtn) {
        const name = prompt("Shortcut name:");
        if (!name) return;
        let url = prompt("URL:");
        if (!url) return;
        if (!url.startsWith('http')) url = 'https://' + url;

        const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
        shortcuts.push({ name, url });
        localStorage.setItem('shortcuts', JSON.stringify(shortcuts));
        renderCustom();
      }
    };

    function renderCustom() {
      document.querySelectorAll('.custom-shortcut').forEach(e => e.remove());
      const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
      const addBtn = $('#addShortcut');

      shortcuts.forEach(s => {
        const div = document.createElement('div');
        div.className = 'shortcut custom-shortcut';
        div.dataset.url = s.url;
        div.innerHTML = `
          <div class="shortcut-icon"><i class="fa-solid fa-link"></i></div>
          <span class="shortcut-label">${s.name}</span>
        `;
        addBtn.before(div);
      });
    }

    renderCustom();

    // Suggestions using the shared helper
      if (window.SuggestionsHelper) {
        SuggestionsHelper.init($('#searchInput'), $('#suggestions'), () => {
          $('#searchForm').dispatchEvent(new Event('submit'));
        });
      }
    });</script></body></html>
