<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Study</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">


    <link rel="dns-prefetch" href="https://www.googletagmanager.com">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>(function (w, d, s, l, i) {
            w[l] = w[l] || []; w[l].push({
                'gtm.start':
                    new Date().getTime(), event: 'gtm.js'
            }); var f = d.getElementsByTagName(s)[0],
                j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
                    'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-5LMBC27Z');</script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg, #0a0a0a);
            font-family: 'Inter', -apple-system, sans-serif;
        }


        .loading-screen {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out, visibility 0.5s;
        }

        .loading-logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .loading-logo i {
            color: var(--text-muted, #a1a1aa);
        }

        .loading-logo span {
            background: linear-gradient(90deg, var(--text, #e4e4e7) 0%, var(--text-muted, #a1a1aa) 40%, var(--text-dim, #52525b) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border, #1f1f1f);
            border-top-color: var(--text-muted, #71717a);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 16px;
            color: var(--text-dim, #52525b);
            font-size: 0.875rem;
        }


        .launch-screen {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .launch-screen.hidden {
            display: none;
        }

        .launch-button {
            background: var(--surface);
            color: var(--text-muted);
            border: none;
            padding: 24px 48px;
            border-radius: var(--radius-lg);
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 16px;
            width: 100%;
            max-width: 300px;
            opacity: 0.75;
        }

        .launch-button:hover {
            opacity: 0.5;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #panic-overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 99999;
            display: none;
        }
    </style>
    <script src="config.js" defer></script>
    <script src="scripts/notifications.js" defer></script>
    <script src="scripts/settings.js" defer></script>
    <script src="scripts/background.js" defer></script>
    <script src="scripts/cloaking.js" defer></script>
    <script src="scripts/quotes.js" defer></script>
    <script>
        try {
            const stored = localStorage.getItem('void_settings');
            if (stored) {
                const s = JSON.parse(stored);
                if (s.accentColor) document.documentElement.style.setProperty('--accent', s.accentColor);
                if (s.surfaceColor) document.documentElement.style.setProperty('--surface', s.surfaceColor);
                if (s.textColor) document.documentElement.style.setProperty('--text', s.textColor);
                if (s.background?.type === 'color') document.documentElement.style.setProperty('--bg', s.background.value);
            }
        } catch (e) { }
    </script>
    <link rel="stylesheet" href="styles/error.css">
    <link rel="stylesheet" href="styles/background.css">

</head>

<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5LMBC27Z" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <div id="fv-cloak" class="neterror">
        <div id="main-frame-error" class="interstitial-wrapper">
            <div id="main-content">
                <div class="icon icon-generic"></div>
                <div id="main-message">
                    <h1>
                        <span>This site can’t be reached</span>
                    </h1>
                    <p>
                        <strong id="origin-text"></strong>’s <abbr id="dnsDefinition">DNS address</abbr> could not be
                        found.
                        Diagnosing the problem.
                    </p>
                    <div class="error-code">DNS_PROBE_POSSIBLE</div>
                </div>
            </div>
            <div id="buttons" class="nav-wrapper suggested-left">
                <div id="control-buttons">
                    <button id="reload-button" class="text-button" onclick="location.reload()">Reload</button>
                </div>
            </div>
        </div>
        <script>
            {
                const origin = window.location.hostname || "This site";
                document.getElementById("origin-text").textContent = origin;

                try {
                    const STORAGE_KEY = 'phantom_fv';
                    const hasBypassed = localStorage.getItem(STORAGE_KEY);
                    const urlParams = new URLSearchParams(window.location.search);
                    const isFakeMode = urlParams.has('fake');

                    if (window.SITE_CONFIG.firstVisitCloak && !hasBypassed && !isFakeMode) {
                        const overlay = document.getElementById('fv-cloak');
                        if (overlay) overlay.style.display = 'block';
                        document.title = origin;

                        document.querySelectorAll("link[rel*='icon']").forEach(l => l.remove());
                        const link = document.createElement('link');
                        link.rel = 'icon';
                        link.href = 'data:,';
                        document.head.appendChild(link);

                        const style = document.createElement('style');
                        style.innerHTML = '#loading-screen { display: none !important; }';
                        document.head.appendChild(style);

                        document.getElementById('reload-button').onclick = function () {
                            localStorage.setItem(STORAGE_KEY, 'true');
                            overlay.style.display = 'none';
                            document.getElementById('main-frame').src = 'index2.html';
                            document.title = 'Phantom Unblocked';

                            document.querySelectorAll("link[rel*='icon']").forEach(l => l.remove());
                            const link = document.createElement('link');
                            link.rel = 'icon';
                            link.href = 'favicon.svg';
                            document.head.appendChild(link);
                        };
                    } else {
                        document.getElementById('main-frame').src = 'index2.html';
                    }
                } catch (e) { }
            }
        </script>
    </div>


    <div id="loading-screen" class="loading-screen">
        <div class="loading-logo">
            <i class="fa-solid fa-ghost"></i>
            <span>Phantom</span>
        </div>
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading...</div>
    </div>


    <div id="launch-screen" class="launch-screen hidden">
        <div class="loading-logo">
            <i class="fa-solid fa-ghost"></i>
            <span>Phantom</span>
        </div>
        <button id="launch-button" class="launch-button"> Launch Phantom</button>
    </div>

    <div id="panic-overlay"></div>

    <iframe id="main-frame"></iframe>

    <script src="scripts/rotation.js" defer></script>

    <script>
        const loadingScreen = document.getElementById('loading-screen');
        const iframe = document.getElementById('main-frame');
        let loadStartTime = Date.now();
        let fallbackTimer = setTimeout(hideLoading, 2000);

        const QUICK_CLICK_TIMEOUT = 1200;
        let quickClickEnabled = false;

        function isQuickClickEnabled() {
            try {
                const stored = localStorage.getItem('void_settings');
                if (stored) {
                    const settings = JSON.parse(stored);
                    return settings.fastLeaveConfirmation !== false;
                }
            } catch (e) { }
            return true;
        }

        function isClickOnEmptySpace(e) {
            const target = e.target;
            if (target === document.body || target === document.documentElement) {
                return true;
            }
            if (target.tagName === 'IFRAME') {
                return false;
            }
            const tag = target.tagName.toLowerCase();
            const isInteractiveTag = ['button', 'a', 'input', 'select', 'textarea', 'label'].includes(tag);
            if (isInteractiveTag) {
                return false;
            }
            let el = target;
            while (el && el !== document.body) {
                const role = el.getAttribute?.('role');
                if (role === 'button' || role === 'link' || role === 'menuitem') {
                    return false;
                }
                if (el.onclick || el.onmousedown || el.onpointerdown) {
                    return false;
                }
                el = el.parentElement;
            }
            const cursor = window.getComputedStyle(target).cursor;
            if (cursor === 'pointer') {
                return false;
            }
            return true;
        }

        function handleQuickClick(e) {
            if (quickClickEnabled) return;
            
            const elapsed = Date.now() - loadStartTime;
            if (elapsed <= QUICK_CLICK_TIMEOUT && isQuickClickEnabled() && isClickOnEmptySpace(e)) {
                quickClickEnabled = true;
                sessionStorage.setItem('sessionLeaveConfirmation', 'true');
                
                if (window.Notify) {
                    window.Notify.info('Leave Confirmation Enabled', 'Leave confirmation has been temporarily enabled for this session.');
                }
            }
        }

        document.addEventListener('click', handleQuickClick, { once: false });

        window.addEventListener('beforeunload', function(e) {
            const settings = window.Settings?.getAll() || {};
            const sessionLeave = sessionStorage.getItem('sessionLeaveConfirmation') === 'true';
            const leaveConfirmed = settings.leaveConfirmation || sessionLeave;
            
            if (document.getElementById('main-frame') && leaveConfirmed) {
                e.preventDefault();
                return e.returnValue = '';
            }
        });

        function showLoading() {
            loadingScreen.classList.remove('hidden');
            if (window.Quotes) window.Quotes.init(true);
            loadStartTime = Date.now();

            clearTimeout(fallbackTimer);
            fallbackTimer = setTimeout(hideLoading, 2000);
        }

        function hideLoading() {
            clearTimeout(fallbackTimer);

            const minTime = 50;
            const elapsed = Date.now() - loadStartTime;
            const remaining = Math.max(0, minTime - elapsed);

            setTimeout(() => {
                loadingScreen.classList.add('hidden');
            }, remaining);

            try {
                if (iframe.contentWindow) {
                    iframe.contentWindow.removeEventListener('unload', showLoading);
                    iframe.contentWindow.addEventListener('unload', () => {
                        requestAnimationFrame(showLoading);
                    });
                }
            } catch (e) { }
        }

        iframe.addEventListener('load', hideLoading);

        window.showLoading = showLoading;
        window.hideLoading = hideLoading;

        console.log('press c to enter');
    </script>
</body>

</html>
